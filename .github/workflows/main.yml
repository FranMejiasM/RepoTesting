# This is a basic workflow to help you get started with Actions   
name: QualityClouds

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events
  pull_request:
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v2
      - name: Prepare modified files
        run: |
          git fetch origin ${{ github.base_ref }} || true
          if [ -n "${{ github.base_ref }}" ]; then
            TARGET_BRANCH="origin/${{ github.base_ref }}"
          else
            TARGET_BRANCH="origin/${{ github.ref }}"
          fi
          git diff "$TARGET_BRANCH" --name-only > modified_files.txt || true
          if [ ! -s modified_files.txt ]; then
            echo "No Salesforce metadata changed; exiting."
            exit 0
          fi
          rm -f modified_files.zip
          zip -@ modified_files.zip < modified_files.txt

      - name: Quality Clouds Scan
        uses: qualityclouds/action-full-scan@feature/QAT-2009
        with:
          mode: local
          version: testing
          token: ${{ secrets.QC_TOKEN_DEV }}
          api_url: "https://api-development.qualityclouds.com"
          zip_path: modified_files.zip
          branch: ${{ github.head_ref }}

